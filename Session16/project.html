<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Quản Lý Nhân Viên</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./project.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Quản Lý Nhân Viên</h1>
    </header>

    <section class="form-section">
      <h2 id="formTitle">Thêm Nhân Viên Mới</h2>
      
      <form id="employeeForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="fullName">Họ và tên <span class="required">*</span></label>
            <input type="text" id="fullName" placeholder="Nhập họ và tên" />
          </div>

          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" placeholder="vd: ten@gmail.com" />
          </div>

          <div class="form-group">
            <label for="dateOfBirth">Ngày sinh <span class="required">*</span></label>
            <input type="date" id="dateOfBirth" />
          </div>

          <div class="form-group">
            <label for="position">Chức vụ <span class="required">*</span></label>
            <select id="position">
              <option value="">-- Chọn chức vụ --</option>
              <option value="Nhân viên">Nhân viên</option>
              <option value="Trưởng nhóm">Trưởng nhóm</option>
              <option value="Trưởng phòng">Trưởng phòng</option>
              <option value="Giám đốc">Giám đốc</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="btnSubmit" class="btn btn-primary">Thêm Nhân Viên</button>
          
          <button type="button" id="btnCancel" class="btn btn-secondary" style="display: none;">Hủy</button>
          
          <button type="reset" id="btnReset" class="btn btn-secondary">Nhập Lại</button>
        </div>
      </form>
    </section>

    <section class="table-section">
      <div class="table-header">
        <h2>Danh Sách Nhân Viên</h2>
        <span id="employeeBadge" class="badge">0 nhân viên</span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Họ và tên</th>
              <th>Email</th>
              <th>Ngày sinh</th>
              <th>Chức vụ</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody">
            </tbody>
        </table>
      </div>
    </section>

    <footer class="footer">
      <span id="totalStats">Tổng số nhân viên: 0</span>
    </footer>
  </div>
  <script src="./project.js"></script>
</body>

</html>
