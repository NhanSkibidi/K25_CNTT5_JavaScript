<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}
</style>
<body>
     <div class="container">
        <div class="header">
            <h1>Chuẩn bị Tết Nguyên Đán</h1>
            <p>Danh sách việc cần làm</p>
        </div>
        <div class="add-task">
            <input id="newTask" placeholder="Thêm công việc mới..." />
            <button onclick="addTask()">Thêm</button>
            <button onclick="clearAll()">Xoá toàn bộ</button>
        </div>
        <div id="todoList"></div>
        <div id="todoList" class="task-list"></div>
        <div id="status" class="footer"></div>
    </div>
    <script>
        const initialData = [
    { task: "Mua bánh chưng", done: false },
    { task: "Dọn nhà đón Tết", done: false },
    { task: "Gói bánh chưng", done: false },
    { task: "Trang trí nhà cửa bằng hoa mai, hoa đào", done: false },
    { task: "Mua phong bao lì xì", done: false },
    { task: "Chuẩn bị mâm ngũ quả", done: false }
];

const container = document.getElementById("todoList");
const entryInput = document.getElementById("newTask");

let taskStore = JSON.parse(localStorage.getItem("myTodos")) || initialData;

const commitToStorage = () => {
    localStorage.setItem("myTodos", JSON.stringify(taskStore));
};

function refreshDisplay() {
    container.innerHTML = "";
    if (taskStore.length === 0) {
        container.innerHTML = "<p>Không có công việc nào</p>";
        return;
    }
    taskStore.map((item, idx) => {
        const row = document.createElement("div");
        row.className = item.done ? "task done" : "task";
        row.innerHTML = `
            <span class="icon">${item.done ? "✔️" : "⚪"}</span>
            <span class="text">${item.task}</span>
            <button class="edit">✏</button>
            <button class="delete">❌</button>
        `;
        row.querySelector(".icon").onclick = () => {
            taskStore[idx].done = !taskStore[idx].done;
            commitToStorage();
            refreshDisplay();
        };
        row.querySelector(".delete").onclick = (e) => {
            e.stopPropagation();
            taskStore.splice(idx, 1);
            commitToStorage();
            refreshDisplay();
        };
        row.querySelector(".edit").onclick = (e) => {
            e.stopPropagation();
            const change = prompt("Chỉnh sửa công việc:", taskStore[idx].task);
            if (change && change.trim() !== "") {
                taskStore[idx].task = change.trim();
                commitToStorage();
                refreshDisplay();
            }
        };
        container.appendChild(row);
    });
}
const handleInsert = () => {
    const txt = entryInput.value.trim();
    if (txt) {
        taskStore.push({ task: txt, done: false });
        commitToStorage();
        refreshDisplay();
        entryInput.value = "";
    }
};
function removeAll() {
    if (confirm("Bạn có chắc muốn xóa hết không?")) {
        taskStore = [];
        commitToStorage();
        refreshDisplay();
    }
}
refreshDisplay();
    </script>
</body>
</html>
