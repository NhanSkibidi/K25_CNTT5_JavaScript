<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
    background-color: rgb(242, 242, 242);
    display: flex;
    justify-content: center;
    margin: 3.125rem 0 0 0;
    font-family: 'Segoe UI', Arial, sans-serif;
}
.container {
    width: 500px;
    background-color: #fff;
    border-radius: 0.75rem;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    overflow: hidden;
}
.footer {
    text-align: center;
    padding-block: 15px;
    color: #777;
    font-size: 0.875rem;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.header {
    background-color: rgb(211, 47, 47);
    color: #ffffff;
    text-align: center;
    padding: 1.56rem;
}

.header h1 {
    margin-bottom: 0;
}

.header p {
    margin-top: 0.31rem;
}

.task-list {
    padding: 1.25rem;
}

.task {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f4ead7;
    padding: 15px;
    margin-bottom: 0.93rem;
    border-radius: 8px;
    border-left: 0.375rem solid #ff8c00;
}

.status {
    color: rgb(119, 119, 119);
    font-style: italic;
}

.text {
    flex-grow: 1;
    margin-left: 10px;
}

.icon {
    margin-right: 0.625rem;
}
</style>
<body>
    <div class="container">

    <div class="header">
        <h1>Chuẩn bị Tết Nguyên Đán</h1>
        <p>Danh sách việc cần làm</p>
    </div>

    <div id="todoList" class="task-list"></div>

    <div id="status" class="footer"></div>

</div>
<script>
    const defaultData = [
    { task: "Mua bánh chưng" },
    { task: "Dọn nhà đón Tết" },
    { task: "Gói bánh chưng" },
    { task: "Trang trí nhà cửa" }
];

const listContainer = document.querySelector("#todoList");
const statusDisplay = document.querySelector("#status");

function initializeApp() {
    let data = JSON.parse(localStorage.getItem("myTodos"));

    if (data && data.length > 0) {
        statusDisplay.textContent = "Dữ liệu đã tồn tại trong localStorage";
    } else {
        localStorage.setItem("myTodos", JSON.stringify(defaultData));
        data = defaultData;
        statusDisplay.textContent = "Đã truyền dữ liệu và lưu vào localStorage";
    }

    renderTasks(data);
}

function renderTasks(items) {
    for (const item of items) {
        const taskNode = document.createElement("div");
        taskNode.classList.add("task");

        const content = `
            <span>🌸</span>
            <span class="text">${item.task}</span>
            <span class="status">Chưa làm</span>
        `;
        
        taskNode.innerHTML = content;
        listContainer.insertAdjacentElement("beforeend", taskNode);
    }
}

initializeApp();
</script>
</body>
</html>
