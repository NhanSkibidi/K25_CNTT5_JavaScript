<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}
</style>
<body>
 <div class="container">
        <div class="header">
            <h1>Chuẩn bị Tết Nguyên Đán</h1>
            <p>Danh sách việc cần làm</p>
        </div>
        <div class="add-task">
            <input id="newTask" placeholder="Thêm công việc mới..." />
            <button onclick="addTask()">Thêm</button>
        </div>
        <div id="todoList"></div>
        <div id="todoList" class="task-list"></div>
        <div id="status" class="footer"></div>
    </div>
    <script>
        const initialTasks = [
    { task: "Mua bánh chưng", done: false },
    { task: "Dọn nhà đón Tết", done: false },
    { task: "Gói bánh chưng", done: false },
    { task: "Trang trí nhà cửa bằng hoa mai, hoa đào", done: false },
    { task: "Mua phong bao lì xì", done: false },
    { task: "Chuẩn bị mâm ngũ quả", done: false }
];

const listView = document.getElementById("todoList");
const inputNode = document.getElementById("newTask");
let taskList = JSON.parse(localStorage.getItem("myTodos")) || initialTasks;
function pushToLocal() {
    localStorage.setItem("myTodos", JSON.stringify(taskList));
}
function displayUI() {
    listView.innerHTML = "";
    taskList.map((item, i) => {
        const taskCard = document.createElement("div");
        taskCard.className = item.done ? "task done" : "task";
        taskCard.innerHTML = `
            <span class="icon">${item.done ? "✔️" : "⚪"}</span>
            <span class="text">${item.task}</span>
            <button class="edit">✏</button>
            <button class="delete">❌</button>
        `;
        taskCard.querySelector(".icon").onclick = () => {
            taskList[i].done = !taskList[i].done;
            pushToLocal();
            displayUI();
        };
        taskCard.querySelector(".edit").onclick = (e) => {
            e.stopPropagation();
            const updatedText = prompt("Sửa nội dung:", taskList[i].task);
            if (updatedText && updatedText.trim()) {
                taskList[i].task = updatedText.trim();
                pushToLocal();
                displayUI();
            }
        };
        taskCard.querySelector(".delete").onclick = (e) => {
            e.stopPropagation();
            taskList.splice(i, 1);
            pushToLocal();
            displayUI();
        };
        listView.appendChild(taskCard);
    });
}
function createNewTask() {
    const userInput = inputNode.value.trim();
    if (userInput.length > 0) {
        taskList.push({ task: userInput, done: false });
        pushToLocal();
        displayUI();
        inputNode.value = "";
    }
}
displayUI();
    </script>
</body>
</html>
