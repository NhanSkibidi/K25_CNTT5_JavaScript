<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chợ Tết Online 2026</title>
    <!-- Nhúng CSS -->
    <link rel="stylesheet" href="./BTVN.CSS">
</head>

<body>

    <header>
        <h1>🧧 CHỢ TẾT ONLINE 🧧</h1>
        <p>Sắm sửa đón xuân - Rinh lộc về nhà</p>
    </header>

    <div class="container">
        <!-- Cột trái: Danh sách sản phẩm -->
        <div class="left-col">
            <h2>Gian Hàng Tết</h2>
            <div id="product-list" class="grid-container">
                <!-- Javascript sẽ render sản phẩm vào đây -->
            </div>
        </div>
        <!--Cột trái-->
        <div class="left-col">
    <section class="admin-controls">
        <h2>Thêm Sản Phẩm Mới</h2>
        <form id="product-form">
            <input type="text" id="product-name" placeholder="Tên sản phẩm" required>
            <input type="number" id="product-price" placeholder="Giá tiền(VNĐ):" required>
            <button type="submit" class="btn-add">Thêm Vào Kệ</button>
        </form>
    </section>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
    <h2>Gian Hàng Tết</h2>
    <div id="product-list" class="grid-container">
        </div>
</div>
        <!-- Cột phải: Giỏ hàng -->
        <div class="right-col">
            <div class="cart-box">
                <h2>🛒 Giỏ Hàng Của Bạn</h2>
                <!-- Danh sách các món đã mua -->
                <ul id="cart-list">
                    <li class="empty-msg">Chưa có món nào...</li>
                </ul>

                <div class="cart-summary">
                    <p>Tổng cộng:</p>
                    <h3 id="total-price">0đ</h3>
                    <button id="btn-checkout" class="btn-checkout"
                        onclick="alert('Cảm ơn bạn đã mua hàng! Chúc mừng năm mới!')">Thanh Toán</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nhúng Javascript -->
    <script src="./BTVN.js"></script>
</body>
</html>
