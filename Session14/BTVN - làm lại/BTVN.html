<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chợ Tết Online 2026</title>
    <!-- Nhúng CSS -->
    <link rel="stylesheet" href="./BTVN.CSS">
</head>

<body>
<body>
    <header>
        <h1>🧧 CHỢ TẾT ONLINE 🧧</h1>
        <p>Sắm sửa đón xuân - Rinh lộc về nhà</p>
    </header>
    <div class="container">
        <div class="left-col">
            <section class="admin-controls">
                <h2>🧧 Thêm Sản Phẩm Tết</h2>
                <form id="product-form">
                    <input type="text" id="product-name" placeholder="Tên sản phẩm (vd: Bánh Chưng)" required>
                    <input type="number" id="product-price" placeholder="Giá tiền (VNĐ)" required>
                    <button type="submit" class="btn-add">Thêm Vào Kệ</button>
                </form>
            </section>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <h2>Gian Hàng Xuân 2026</h2>
            <div id="product-list" class="grid-container"></div>
        </div>
        <div class="right-col">
            <div class="cart-box">
                <h2>🛒 Giỏ Hàng Của Bạn</h2>
                <ul id="cart-list">
                    <li class="empty-msg">Chưa có món nào...</li>
                </ul>
                <div class="cart-summary">
                    <p>Tổng cộng:</p>
                    <h3 id="total-price">0đ</h3>
                    <button id="btn-checkout" class="btn-checkout" onclick="checkout()">Thanh Toán</button>
                </div>
            </div>
        </div>
    </div>
    <script src="./BTVN.js"></script>
</body>
</body>
</html>
